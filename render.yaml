services:
  - type: web
    name: ruta-admin
    runtime: node
    repo: https://github.com/orkoruta/frontend-ruta
    rootDir: .
    buildCommand: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm --filter @ruta/admin build
    startCommand: pnpm --filter @ruta/admin start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ruta-api.onrender.com
      - key: NPM_TOKEN
        sync: false

  - type: web
    name: ruta-storefront
    runtime: node
    repo: https://github.com/orkoruta/frontend-ruta
    rootDir: .
    buildCommand: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm --filter @ruta/storefront build
    startCommand: pnpm --filter @ruta/storefront start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ruta-api.onrender.com
      - key: NPM_TOKEN
        sync: false
