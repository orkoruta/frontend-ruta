name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Build @orkoruta/ui
        run: pnpm --filter @orkoruta/ui build

      - name: Build admin
        run: pnpm --filter @ruta/admin build

      - name: Build storefront
        run: pnpm --filter @ruta/storefront build

      - name: Lint
        run: pnpm lint
